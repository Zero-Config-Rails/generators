name: Rails options watch

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Check Rails generator options drift
        id: check
        run: bundle exec rake rails_options:check
        continue-on-error: true

      - name: Open or update drift issue
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process')
            let driftOutput = ''
            try {
              execSync('bundle exec rake rails_options:check', { stdio: 'pipe' })
            } catch (error) {
              driftOutput = error.stdout?.toString() || error.message
            }

            const title = 'Rails generator options drift detected'
            const body = `## Rails generator options drift

            Upstream Rails generator help output differs from \`config/rails_generator_options_baseline.yml\`.

            \`\`\`
            ${driftOutput.trim()}
            \`\`\`

            ### Remediation

            \`\`\`bash
            bundle exec rake rails_new:parse_options
            bundle exec rake rails_generate:parse_all
            bundle exec rake rails_options:baseline
            git add app/helpers/rails_generators config/rails_generator_options_baseline.yml
            git commit -m "Sync Rails generator options"
            \`\`\`

            _Opened by [rails-options-watch](.github/workflows/rails-options-watch.yml)._`

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'rails-options-drift'
            })

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body
              })
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['rails-options-drift']
              })
            }

      - name: Fail when drift detected
        if: steps.check.outcome == 'failure'
        run: exit 1
